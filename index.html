<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 60px 0 0;
    }

    #book {
      width: 100%;
      height: 100%;
    }

    .loading {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #ddd;
      font-size: 14px;
      z-index: 1000;
    }

    #fullscreenBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10000;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border: 1px solid #666;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      #book-wrap {
        width: 98vw;
        height: 88vh;
      }
    }
  </style>
</head>

<body>
  <button id="fullscreenBtn">⛶</button>
  <div id="loading" class="loading">Loading flipbook…</div>

  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.worker.min.mjs";

    const bookEl = document.getElementById("book");
    const loadingEl = document.getElementById("loading");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const PDF_URL =
      "https://rmsretailers.com/wp-content/uploads/2026/04/RMS-Management-Portfolio-2026-FINAL.pdf";

    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };

    async function buildFlipbook() {
      const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
      const pages = [];
      const scale = window.innerWidth < 820 ? 1.1 : 1.4;
      const maxPages = window.innerWidth < 820 ? 80 : 140;

      for (let i = 1; i <= Math.min(pdf.numPages, maxPages); i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport }).promise;
        pages.push(canvas.toDataURL("image/jpeg", 0.92));
      }

      const flipbook = new St.PageFlip(bookEl, {
        width: 550,
        height: 720,
        size: "stretch",
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: true
      });

      flipbook.loadFromImages(pages);
      loadingEl.remove();
    }

    buildFlipbook();
  </script>
</body>
</html>
``
