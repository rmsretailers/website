<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 70px auto 0;
      position: relative;
    }

    #book {
      width: 100%;
      height: 100%;
    }

    /* ---------- RMS CONTROL BAR ---------- */

    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10000;
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 8px;
      align-items: center;
    }

    #controls button {
      background: transparent;
      border: 1px solid #777;
      color: #fff;
      cursor: pointer;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 4px;
      white-space: nowrap;
    }

    #controls button:hover {
      background: rgba(255,255,255,0.1);
    }

    #fullscreenBtn span {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.85;
    }

    /* ---------- RMS LOGO ---------- */

    #rms-logo {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 9000;
      opacity: 0.85;
    }

    #rms-logo img {
      height: 42px;
      width: auto;
    }

    /* ---------- MOBILE ---------- */

    @media (max-width: 820px) {
      #book-wrap {
        width: 98vw;
        height: 88vh;
        margin-top: 64px;
      }

      #controls {
        padding: 8px;
      }

      #controls button span {
        display: none;
      }

      #rms-logo img {
        height: 34px;
      }
    }
  </style>
</head>

<body>

  <!-- RMS CONTROLS -->
  <div id="controls">
    <button id="fullscreenBtn">
      ⛶ <span>Enter Fullscreen</span>
    </button>
    <button id="zoomOut">−</button>
    <button id="zoomIn">+</button>
  </div>

  <!-- RMS LOGO -->
  <div id="rms-logo">
    <img src="https://rmsretailers.com/wp-content/uploads/2024/01/RMS-Logo-White.png" alt="RMS Retailers">
  </div>

  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.worker.min.mjs";

    const PDF_URL =
      "https://rmsretailers.com/wp-content/uploads/2026/04/RMS-Management-Portfolio-2026-FINAL.pdf";

    const bookEl = document.getElementById("book");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const zoomInBtn = document.getElementById("zoomIn");
    const zoomOutBtn = document.getElementById("zoomOut");

    let pageFlip;
    let zoomScale = 1.25;

    function updateFullscreenLabel() {
      const span = fullscreenBtn.querySelector("span");
      if (!span) return;
      span.textContent = document.fullscreenElement
        ? "Exit Fullscreen"
        : "Enter Fullscreen";
    }

    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };

    document.addEventListener("fullscreenchange", updateFullscreenLabel);

    zoomInBtn.onclick = () => {
      zoomScale = Math.min(1.8, zoomScale + 0.1);
      bookEl.style.transform = `scale(${zoomScale})`;
    };

    zoomOutBtn.onclick = () => {
      zoomScale = Math.max(0.8, zoomScale - 0.1);
      bookEl.style.transform = `scale(${zoomScale})`;
    };

    async function buildFlipbook() {
      const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
      const images = [];

      const isMobile = window.innerWidth < 820;
      const scale = isMobile ? 1.1 : 1.4;
      const maxPages = isMobile ? 80 : 140;

      for (let i = 1; i <= Math.min(pdf.numPages, maxPages); i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        images.push(canvas.toDataURL("image/jpeg", 0.92));
      }

      pageFlip = new St.PageFlip(bookEl, {
        width: 550,
        height: 720,
        size: "stretch",
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: true
      });

      pageFlip.loadFromImages(images);
    }

    buildFlipbook();
    updateFullscreenLabel();
  </script>

</body>
</html>
``
