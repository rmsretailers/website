<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <!-- Page Flip CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 70px auto 0;
    }

    #book {
      width: 100%;
      height: 100%;
      transform-origin: center center;
    }

    /* ===== LOADING OVERLAY ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 20000;
    }

    #loading-overlay.hidden {
      display: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #fff;
      font-size: 14px;
      opacity: 0.85;
      text-align: center;
    }

    /* ===== CONTROLS ===== */
    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 15000;
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 8px;
      align-items: center;
    }

    #controls button {
      background: transparent;
      border: 1px solid #777;
      color: #fff;
      cursor: pointer;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 4px;
      white-space: nowrap;
    }

    #controls button:hover {
      background: rgba(255,255,255,0.1);
    }

    #fullscreenBtn span {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.85;
    }

    /* ===== RMS LOGO ===== */
    #rms-logo {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 14000;
      opacity: 0.8;
    }

    #rms-logo img {
      height: 42px;
      width: auto;
    }

    @media (max-width: 820px) {
      #book-wrap {
        width: 98vw;
        height: 88vh;
        margin-top: 64px;
      }

      #controls button span {
        display: none;
      }

      #rms-logo img {
        height: 34px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADING -->
  <div id="loading-overlay">
    <div>
      <div class="spinner"></div>
      <div class="loading-text">Loading Portfolio…</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controls">
    <button id="fullscreenBtn">⛶ <span>Enter Fullscreen</span></button>
    <button id="zoomOut">−</button>
    <button id="zoomIn">+</button>
  </div>

  <!-- RMS LOGO -->
  <div id="rms-logo">
    <img
      src="https://rmsretailers.com/wp-content/uploads/2024/01/RMS-Logo-White.png"
      alt="RMS Retailers"
    />
  </div>

  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <!-- Page Flip JS -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <!-- PDF + App -->
  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.worker.min.mjs";

    const PDF_URL =
      "https://rmsretailers.com/wp-content/uploads/2026/04/RMS-Management-Portfolio-2026-FINAL.pdf";

    const bookEl = document.getElementById("book");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const zoomInBtn = document.getElementById("zoomIn");
    const zoomOutBtn = document.getElementById("zoomOut");
    const loader = document.getElementById("loading-overlay");

    let zoom = 1.25;

    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };

    document.addEventListener("fullscreenchange", () => {
      fullscreenBtn.querySelector("span").textContent =
        document.fullscreenElement ? "Exit Fullscreen" : "Enter Fullscreen";
    });

    zoomInBtn.onclick = () => {
      zoom = Math.min(1.8, zoom + 0.1);
      bookEl.style.transform = `scale(${zoom})`;
    };

    zoomOutBtn.onclick = () => {
      zoom = Math.max(0.8, zoom - 0.1);
      bookEl.style.transform = `scale(${zoom})`;
    };

    async function buildFlipbook() {
      const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
      const pages = [];

      const mobile = window.innerWidth < 820;
      const scale = mobile ? 1.1 : 1.4;
      const maxPages = mobile ? 80 : 140;

      for (let i = 1; i <= Math.min(pdf.numPages, maxPages); i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;

        pages.push(canvas.toDataURL("image/jpeg", 0.92));
      }

      const flip = new St.PageFlip(bookEl, {
        width: 550,
        height: 720,
        size: "stretch",
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: true
      });

      flip.loadFromImages(pages);
      loader.classList.add("hidden");
    }

    buildFlipbook();
  </script>

</body>
</html>
``
