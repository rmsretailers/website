<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  />

  <style>
    :root {
      --bg: #111;
      --panel: rgba(0,0,0,0.75);
      --border: #555;
      --border2: #777;
      --text: #fff;
      --text2: rgba(255,255,255,0.85);
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 70px auto 0;
    }

    #book {
      width: 100%;
      height: 100%;
      transform-origin: center center;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20000;
    }

    #loading-overlay.hidden {
      display: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid var(--text);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text);
      font-size: 14px;
      opacity: 0.85;
      text-align: center;
    }

    /* Controls */
    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 15000;
      display: flex;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      align-items: center;
    }

    #controls button {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text);
      cursor: pointer;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 4px;
      white-space: nowrap;
    }

    #controls button:hover {
      background: rgba(255,255,255,0.15);
    }

    #fullscreenBtn span {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.85;
    }

    /* RMS Logo */
    #rms-logo {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 14000;
      opacity: 0.85;
      pointer-events: none;
      user-select: none;
    }

    #rms-logo img {
      height: 42px;
      width: auto;
      display: block;
    }

    /* Embedded mode: WordPress wrapper handles fullscreen, hide inner fullscreen button */
    html.embedded #fullscreenBtn {
      display: none;
    }

    /* Mobile */
    @media (max-width: 820px) {
      #book-wrap {
        width: 98vw;
        height: 88vh;
        margin-top: 64px;
      }

      #controls button span {
        display: none;
      }

      #rms-logo img {
        height: 34px;
      }
    }
  </style>
</head>

<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div>
      <div class="spinner"></div>
      <div class="loading-text">Loading Portfolio…</div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="fullscreenBtn">⛶ <span>Enter Fullscreen</span></button>
    <button id="zoomOut">−</button>
    <button id="zoomIn">+</button>
  </div>

  <!-- RMS Logo -->
  <div id="rms-logo">
    <img
      src="https://rmsretailers.com/wp-content/uploads/2025/05/cropped-Heading-1.png"
      alt="RMS Retailers"
      loading="lazy"
      decoding="async"
    />
  </div>

  <!-- Flipbook -->
  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.worker.min.mjs";

    const PDF_URL =
      "https://rmsretailers.com/wp-content/uploads/2026/04/RMS-Management-Portfolio-2026-FINAL.pdf";

    const bookEl = document.getElementById("book");
    const loader = document.getElementById("loading-overlay");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const zoomInBtn = document.getElementById("zoomIn");
    const zoomOutBtn = document.getElementById("zoomOut");

    // Detect embedded context (WordPress iframe)
    const rmsEmbedded = (() => {
      try {
        return window.self !== window.top;
      } catch (e) {
        return true;
      }
    })();

    if (rmsEmbedded) {
      document.documentElement.classList.add("embedded");
    }

    let zoom = 1.25;

    function updateFullscreenLabel() {
      if (!fullscreenBtn) return;
      const label = fullscreenBtn.querySelector("span");
      if (!label) return;
      label.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Enter Fullscreen";
    }

    function requestFullscreen(el) {
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if (el.msRequestFullscreen) return el.msRequestFullscreen();
    }

    function exitFullscreen() {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if (document.msExitFullscreen) return document.msExitFullscreen();
    }

    if (fullscreenBtn) {
      fullscreenBtn.addEventListener("click", () => {
        if (document.fullscreenElement) {
          exitFullscreen();
        } else {
          requestFullscreen(document.documentElement);
        }
      });
    }

    document.addEventListener("fullscreenchange", updateFullscreenLabel);
    updateFullscreenLabel();

    zoomInBtn.addEventListener("click", () => {
      zoom = Math.min(1.8, zoom + 0.1);
      bookEl.style.transform = `scale(${zoom})`;
    });

    zoomOutBtn.addEventListener("click", () => {
      zoom = Math.max(0.8, zoom - 0.1);
      bookEl.style.transform = `scale(${zoom})`;
    });

    async function buildFlipbook() {
      const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
      const pages = [];

      const isMobile = window.innerWidth < 820;
      const renderScale = isMobile ? 1.1 : 1.4;
      const maxPages = isMobile ? 80 : 140;

      for (let i = 1; i <= Math.min(pdf.numPages, maxPages); i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: renderScale });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        await page.render({ canvasContext: ctx, viewport }).promise;
        pages.push(canvas.toDataURL("image/jpeg", 0.92));
      }

      const flipbook = new St.PageFlip(bookEl, {
        width: 550,
        height: 720,
        size: "stretch",
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: true
      });

      flipbook.loadFromImages(pages);

      if (loader) loader.classList.add("hidden");
    }

    buildFlipbook();
  </script>
</body>
</html>
